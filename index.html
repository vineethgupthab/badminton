<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0b0d12" />
<title>Badminton Match Maker</title>
<style>
  :root{
    color-scheme: light dark;
    --bg:#0b0d12; --card:#151922; --card2:#1c2230; --line:rgba(255,255,255,.08);
    --txt:#f2f4f8; --dim:#9aa3b2; --accent:#34d399; --accent2:#22d3ee;
    --a:#ffd23f; --b:#60a5fa; --rest:#8b93a4;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;
    background:
      radial-gradient(1000px 600px at 15% -10%, rgba(52,211,153,.14), transparent 60%),
      radial-gradient(900px 600px at 100% 0%, rgba(34,211,238,.12), transparent 55%),
      var(--bg);
    color:var(--txt); min-height:100vh; padding:32px 20px 80px;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:920px;margin:0 auto}
  header{margin-bottom:26px}
  h1{font-size:34px;font-weight:800;letter-spacing:-1px;
    background:linear-gradient(120deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  .tag{color:var(--dim);font-size:15px;margin-top:6px}

  .card{background:var(--card);border:1px solid var(--line);border-radius:20px;
    padding:22px;margin-bottom:18px;box-shadow:0 8px 30px rgba(0,0,0,.25)}
  .card h2{font-size:13px;text-transform:uppercase;letter-spacing:1.2px;color:var(--dim);
    font-weight:700;margin-bottom:14px}

  /* player input */
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;min-height:8px}
  .chip{display:inline-flex;align-items:center;gap:8px;background:var(--card2);
    border:1px solid var(--line);border-radius:999px;padding:8px 8px 8px 14px;font-size:15px}
  .chip .n{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;
    background:rgba(255,255,255,.06);font-size:11px;color:var(--dim)}
  .chip button{background:none;border:0;color:var(--dim);cursor:pointer;font-size:16px;
    width:22px;height:22px;border-radius:50%;line-height:1}
  .chip button:hover{background:rgba(255,80,80,.2);color:#fff}
  .inputRow{display:flex;gap:10px;flex-wrap:wrap}
  input[type=text],input[type=number]{
    background:var(--card2);border:1px solid var(--line);color:var(--txt);
    border-radius:12px;padding:13px 15px;font:inherit;font-size:15px;outline:none}
  input:focus{border-color:var(--accent)}
  #nameInput{flex:1;min-width:200px}

  .controls{display:flex;gap:18px;flex-wrap:wrap;align-items:flex-end}
  .field{display:flex;flex-direction:column;gap:7px}
  .field label{font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:.6px}
  .seg{display:inline-flex;background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:4px}
  .seg button{background:none;border:0;color:var(--dim);font:inherit;font-weight:600;
    padding:9px 16px;border-radius:9px;cursor:pointer}
  .seg button.on{background:var(--accent);color:#04231a}
  #rounds{width:90px}

  .btn{font:inherit;font-weight:700;font-size:16px;border:0;border-radius:14px;cursor:pointer;
    padding:14px 26px;transition:transform .12s ease,filter .2s}
  .btn:hover{transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn.primary{background:linear-gradient(120deg,var(--accent),var(--accent2));color:#04231a}
  .btn.ghost{background:var(--card2);color:var(--txt);border:1px solid var(--line);font-weight:600}
  .btnRow{display:flex;gap:12px;flex-wrap:wrap;margin-top:6px}

  .hint{color:var(--dim);font-size:13px;margin-top:10px}
  .suggest{margin-top:12px;display:none;align-items:center;gap:12px;flex-wrap:wrap;
    background:linear-gradient(120deg,rgba(52,211,153,.12),rgba(34,211,238,.08));
    border:1px solid rgba(52,211,153,.3);border-radius:12px;padding:12px 14px;font-size:14px}
  .suggest.show{display:flex}
  .suggest .txt{color:var(--txt)}
  .suggest .txt b{color:var(--accent)}
  .suggest button{font:inherit;font-weight:700;font-size:13px;border:0;border-radius:9px;cursor:pointer;
    padding:8px 14px;background:var(--accent);color:#04231a;white-space:nowrap}
  .suggest button:hover{filter:brightness(1.05)}
  .err{color:#ff6b6b;font-size:14px;margin-top:10px}

  /* schedule */
  #out{display:none}
  .round{background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:16px 18px;margin-bottom:14px}
  .round .top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .round .rn{font-size:13px;font-weight:800;letter-spacing:.5px;color:var(--dim)}
  .match{display:grid;grid-template-columns:1fr auto 1fr;gap:14px;align-items:stretch}
  /* multi-court layout */
  .courts.multi{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px}
  .courtGame{background:rgba(255,255,255,.02);border:1px solid var(--line);border-radius:14px;padding:12px}
  .courts:not(.multi) .courtGame{background:none;border:0;padding:0}
  .courtTag{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;
    color:var(--accent2);background:rgba(34,211,238,.12);border:1px solid rgba(34,211,238,.25);
    border-radius:8px;padding:3px 9px;margin-bottom:10px}
  .team{border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:6px}
  .team.A{background:linear-gradient(160deg,rgba(255,210,63,.16),rgba(255,210,63,.05));
    border:1px solid rgba(255,210,63,.3)}
  .team.B{background:linear-gradient(160deg,rgba(96,165,250,.16),rgba(96,165,250,.05));
    border:1px solid rgba(96,165,250,.3)}
  .team .lbl{font-size:11px;text-transform:uppercase;letter-spacing:1px;font-weight:800;opacity:.75}
  .team.A .lbl{color:var(--a)} .team.B .lbl{color:var(--b)}
  .team .p{font-size:19px;font-weight:700}
  .vs{align-self:center;font-weight:800;color:var(--dim);font-size:15px}
  /* winner selection */
  .team{cursor:pointer;transition:transform .1s ease, box-shadow .2s, opacity .2s}
  .team:hover{transform:translateY(-2px)}
  .team.win{box-shadow:0 0 0 2px var(--accent), 0 8px 24px rgba(52,211,153,.25)}
  .team.win .lbl::after{content:" · WINNER 🏆";color:var(--accent)}
  .team.lose{opacity:.55}
  .pickHint{font-size:12px;color:var(--dim);margin-top:10px}
  .match.decided .pickHint{display:none}
  /* score entry */
  .scores{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:12px}
  .scores .sd{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--dim);font-weight:700}
  .scores .sd.A{color:var(--a)} .scores .sd.B{color:var(--b)}
  .scores input{width:60px;padding:9px;text-align:center;font-size:20px;font-weight:800}
  .scores .dash{color:var(--dim);font-weight:800}

  /* leaderboard */
  table.lb{width:100%;border-collapse:collapse;font-size:15px}
  table.lb th,table.lb td{padding:11px 12px;text-align:center}
  table.lb th{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);
    border-bottom:1px solid var(--line);font-weight:700}
  table.lb td{border-bottom:1px solid var(--line)}
  table.lb td.name,table.lb th.name{text-align:left;font-weight:700}
  table.lb tr:last-child td{border-bottom:0}
  table.lb .rank{color:var(--dim);width:34px}
  table.lb tr.top1 .rank{color:#ffd23f} table.lb tr.top2 .rank{color:#cbd5e1} table.lb tr.top3 .rank{color:#d9a06b}
  table.lb .w{color:var(--accent);font-weight:700}
  table.lb .l{color:#ff8080}
  .barcell{min-width:110px}
  .bar{height:8px;border-radius:6px;background:var(--card2);overflow:hidden}
  .bar>span{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2))}

  /* insights */
  .insights{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
  .ins{background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:14px 16px;
    display:flex;gap:12px;align-items:flex-start}
  .ins .ic{font-size:22px;line-height:1}
  .ins .k{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--dim);font-weight:700}
  .ins .v{font-size:17px;font-weight:800;margin-top:3px}
  .ins .d{font-size:13px;color:var(--dim);margin-top:2px}
  .emptyIns{color:var(--dim);font-size:14px}

  /* celebration */
  #fx{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:60;display:none}
  #champ{position:fixed;left:50%;top:22%;transform:translateX(-50%) scale(.8);
    z-index:61;pointer-events:none;text-align:center;opacity:0;transition:opacity .5s ease, transform .5s cubic-bezier(.2,1.4,.4,1)}
  #champ.show{opacity:1;transform:translateX(-50%) scale(1)}
  #champ .crown{font-size:60px;filter:drop-shadow(0 6px 16px rgba(0,0,0,.5))}
  #champ .ttl{font-size:15px;letter-spacing:3px;text-transform:uppercase;color:var(--dim);font-weight:700;margin-top:6px}
  #champ .who{font-size:52px;font-weight:900;letter-spacing:-1px;
    background:linear-gradient(120deg,#ffd23f,#ff9f1c,#34d399,#22d3ee);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 4px 18px rgba(255,210,63,.35))}
  #champ .sub{color:var(--txt);font-size:16px;margin-top:6px;opacity:.85}
  .rest{margin-top:12px;font-size:14px;color:var(--dim)}
  .rest b{color:var(--rest);font-weight:700}
  .rest .rp{display:inline-block;background:var(--card2);border:1px solid var(--line);
    border-radius:8px;padding:3px 9px;margin:3px 4px 0 0;color:var(--txt);font-size:13px}

  /* stats */
  .statgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
  .stat{background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
  .stat .nm{font-weight:700;font-size:15px}
  .stat .mt{font-size:13px;color:var(--dim);margin-top:3px}
  .summ{display:flex;gap:22px;flex-wrap:wrap;margin-bottom:16px}
  .summ .b{background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:12px 18px}
  .summ .v{font-size:26px;font-weight:800}
  .summ .k{font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:.6px}

  /* ============ MOBILE ============ */
  @media (max-width: 640px){
    body{ padding:18px 12px calc(60px + env(safe-area-inset-bottom));
      background-attachment:fixed; }
    .wrap{ max-width:100%; }
    header{ margin-bottom:18px; }
    h1{ font-size:26px; letter-spacing:-.5px; }
    .tag{ font-size:13px; }
    .card{ padding:16px; border-radius:16px; margin-bottom:14px; }

    /* inputs at 16px so iOS Safari doesn't auto-zoom on focus */
    input[type=text], input[type=number]{ font-size:16px; padding:12px 14px; }
    #nameInput{ min-width:0; width:100%; }
    .inputRow{ flex-direction:column; }
    .inputRow .btn{ width:100%; }

    /* settings stack vertically, full width */
    .controls{ flex-direction:column; align-items:stretch; gap:14px; }
    .field{ width:100%; }
    .seg{ width:100%; }
    .seg button{ flex:1; padding:11px 8px; font-size:14px; }
    #rounds, #courts{ width:100%; }
    #genBtn{ width:100%; }

    .btnRow{ flex-direction:column; }
    .btnRow .btn{ width:100%; }
    .btn{ padding:14px 20px; }

    /* match: keep A vs B on one row but tighten */
    .match{ gap:8px; }
    .team{ padding:10px; }
    .team .p{ font-size:16px; }
    .team .lbl{ font-size:10px; }
    .vs{ font-size:13px; }
    .courts.multi{ grid-template-columns:1fr; }  /* one court per row */
    .scores input{ width:56px; font-size:18px; }

    /* summary tiles: 2-up grid instead of overflowing row */
    .summ{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    .summ .b{ padding:10px 12px; }
    .summ .v{ font-size:22px; }
    .statgrid{ grid-template-columns:repeat(2,1fr); }
    .insights{ grid-template-columns:1fr; }

    /* leaderboard: drop the form bar, shrink padding, allow horizontal scroll if needed */
    #lb{ overflow-x:auto; -webkit-overflow-scrolling:touch; }
    table.lb{ font-size:13px; }
    table.lb th, table.lb td{ padding:8px 6px; }
    table.lb .barcell{ display:none; }   /* hide Form column on small screens */

    .suggest{ flex-direction:column; align-items:stretch; }
    .suggest button{ width:100%; }

    #champ .who{ font-size:38px; }
    #champ .crown{ font-size:46px; }
  }

  /* very narrow phones */
  @media (max-width: 380px){
    .team .p{ font-size:14px; }
    .statgrid{ grid-template-columns:1fr; }
  }
</style>
</head>
<body>
<canvas id="fx"></canvas>
<div id="champ">
  <div class="crown">👑</div>
  <div class="ttl">Champion</div>
  <div class="who" id="champName">—</div>
  <div class="sub" id="champSub"></div>
</div>
<div class="wrap">
  <header>
    <h1>🏸 Badminton Match Maker</h1>
    <div class="tag">Fair rotation for one court — everyone plays an equal number of games with the shortest possible wait.</div>
  </header>

  <!-- Players -->
  <div class="card">
    <h2>Players</h2>
    <div class="chips" id="chips"></div>
    <div class="inputRow">
      <input type="text" id="nameInput" placeholder="Type a name, press Enter (or paste a list separated by commas / new lines)" autocomplete="off" />
      <button class="btn ghost" id="addBtn">Add</button>
    </div>
    <div class="btnRow">
      <button class="btn ghost" id="clearBtn">Clear all</button>
    </div>
    <div class="hint" id="count">0 players</div>
  </div>

  <!-- Settings -->
  <div class="card">
    <h2>Settings</h2>
    <div class="controls">
      <div class="field">
        <label>Format</label>
        <div class="seg" id="mode">
          <button data-t="2" class="on">Doubles (2 v 2)</button>
          <button data-t="1">Singles (1 v 1)</button>
        </div>
      </div>
      <div class="field">
        <label>Courts</label>
        <input type="number" id="courts" min="1" max="20" value="1" />
      </div>
      <div class="field">
        <label>Plan by</label>
        <div class="seg" id="planMode">
          <button data-m="gpp" class="on">Games / player</button>
          <button data-m="rounds">Total rounds</button>
        </div>
      </div>
      <div class="field">
        <label id="numLabel">Games per player</label>
        <input type="number" id="rounds" min="1" max="200" value="4" />
      </div>
      <div class="field">
        <button class="btn primary" id="genBtn">Generate schedule</button>
      </div>
    </div>
    <div class="hint" id="predict"></div>
    <div class="suggest" id="suggest"></div>
    <div class="err" id="err"></div>
  </div>

  <!-- Output -->
  <div id="out">
    <div class="card">
      <h2>Fairness summary</h2>
      <div class="summ" id="summ"></div>
      <div class="statgrid" id="stats"></div>
    </div>
    <div class="btnRow" style="margin-bottom:14px">
      <button class="btn primary" id="reshuffle">🎲 Re-shuffle</button>
      <button class="btn ghost" id="copyBtn">Copy schedule</button>
      <button class="btn ghost" id="resetResults">Reset results</button>
    </div>
    <div id="schedule"></div>

    <div class="card">
      <h2>💡 Insights</h2>
      <div id="insights"></div>
    </div>
    <div class="card">
      <h2>🏆 Leaderboard</h2>
      <div id="lb"></div>
    </div>
  </div>
</div>

<script>
// ---------------- state ----------------
let players = [];
let teamSize = 2;          // 2 = doubles, 1 = singles
let lastSchedule = null;

const $ = (id) => document.getElementById(id);
const chipsEl = $("chips"), countEl = $("count"), predictEl = $("predict"), errEl = $("err");

// ---------------- players UI ----------------
const ROSTER_KEY = "badminton.roster";
function saveRoster(){ try{ localStorage.setItem(ROSTER_KEY, JSON.stringify(players)); }catch(e){} }
function loadRoster(){ try{ const s=localStorage.getItem(ROSTER_KEY); if(s) players=JSON.parse(s)||[]; }catch(e){} }

function renderChips(){
  chipsEl.innerHTML = "";
  players.forEach((p,i)=>{
    const c = document.createElement("span");
    c.className = "chip";
    c.innerHTML = `<span class="n">${i+1}</span>${escapeHtml(p)}<button title="remove">×</button>`;
    c.querySelector("button").onclick = ()=>{ players.splice(i,1); renderChips(); };
    chipsEl.appendChild(c);
  });
  countEl.textContent = `${players.length} player${players.length===1?"":"s"} · saved automatically`;
  saveRoster();
  updatePrediction();
}
function addNames(raw){
  const parts = raw.split(/[\n,]+/).map(s=>s.trim()).filter(Boolean);
  for(const name of parts){
    if(!players.some(p=>p.toLowerCase()===name.toLowerCase())) players.push(name);
  }
  renderChips();
}
$("addBtn").onclick = ()=>{ addNames($("nameInput").value); $("nameInput").value=""; $("nameInput").focus(); };
$("nameInput").addEventListener("keydown",(e)=>{
  if(e.key==="Enter" || e.key===","){ e.preventDefault(); addNames($("nameInput").value); $("nameInput").value=""; }
});
$("clearBtn").onclick = ()=>{ players=[]; renderChips(); };

// ---------------- settings UI ----------------
let planMode = "gpp"; // "gpp" = games per player, "rounds" = total rounds
$("mode").querySelectorAll("button").forEach(b=>{
  b.onclick = ()=>{
    $("mode").querySelectorAll("button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on"); teamSize = +b.dataset.t; updatePrediction();
  };
});
$("planMode").querySelectorAll("button").forEach(b=>{
  b.onclick = ()=>{
    $("planMode").querySelectorAll("button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on"); planMode = b.dataset.m;
    $("numLabel").textContent = planMode==="gpp" ? "Games per player" : "Total rounds";
    $("rounds").value = planMode==="gpp" ? 4 : 8;
    updatePrediction();
  };
});
$("rounds").addEventListener("input", updatePrediction);
$("courts").addEventListener("input", updatePrediction);

// how many courts we can actually fill given the player count
function usableCourts(){
  const perGame = teamSize*2;
  const c = Math.max(1, +$("courts").value || 1);
  return Math.max(1, Math.min(c, Math.floor(players.length / perGame)));
}

// Convert the input into an actual number of rounds to play.
function resolveRounds(){
  const val = +$("rounds").value || 0;
  const N = players.length, seats = usableCourts()*teamSize*2;
  if(planMode==="rounds") return val;
  if(N < teamSize*2 || val < 1) return 0;
  // games-per-player: snap UP to a perfectly-fair block so everyone gets the EXACT same count.
  const g = gcd(N, seats);
  const minRounds = N / g, gamesEach = seats / g;
  const blocks = Math.ceil(val / gamesEach);
  return blocks * minRounds;   // always yields an exactly-equal split
}

function updatePrediction(){
  errEl.textContent = "";
  const N = players.length, perGame = teamSize*2;
  const sug = $("suggest");
  if(N < perGame){
    predictEl.textContent = `Add at least ${perGame} players for ${teamSize===2?"doubles":"singles"}.`;
    sug.classList.remove("show"); return;
  }
  const courts = usableCourts(), seats = courts*perGame;
  const R = resolveRounds();
  const g = gcd(N, seats);
  const minRounds = N / g;               // fewest rounds where everyone is exactly equal
  const gamesEach = seats / g;           // games each player gets in that block

  const courtNote = (+$("courts").value>courts)
    ? ` (only ${courts} court${courts===1?"":"s"} usable with ${N} players)` : "";

  // empty / zero input -> guide instead of showing "0 games"
  if(R < 1){
    predictEl.textContent = (planMode==="gpp"
      ? `Enter how many games each player should get.`
      : `Enter how many rounds to play.`) + courtNote;
    showSuggestion(minRounds, gamesEach);
    return;
  }

  const slots = R*seats;
  const base = Math.floor(slots/N), extra = slots%N;
  const each = extra===0 ? `${base} games each` : `${base}–${base+1} games each (${extra} player${extra===1?"":"s"} get one extra)`;
  const restPer = N-seats;
  let lead = "";
  if(planMode==="gpp"){
    const want = +$("rounds").value||0;
    lead = (base>want)
      ? `Rounded up to a fair block → everyone gets exactly ${base} games → `
      : `Everyone gets exactly ${base} games → `;
  }
  predictEl.textContent = `${lead}${R} round${R===1?"":"s"} on ${courts} court${courts===1?"":"s"} · ${seats} playing, ${restPer} resting each round · ${each}.${courtNote}`;

  const alreadyFair = extra===0;
  if(alreadyFair) $("suggest").classList.remove("show");
  else showSuggestion(minRounds, gamesEach);
}

function showSuggestion(minRounds, gamesEach){
  const sug = $("suggest");
  sug.innerHTML =
    `<span class="txt">💡 For <b>perfectly equal</b> chances, play a multiple of <b>${minRounds} round${minRounds===1?"":"s"}</b> ` +
    `(everyone gets ${gamesEach} game${gamesEach===1?"":"s"} per ${minRounds}-round block).</span>` +
    `<button id="useSuggest" data-r="${minRounds}">Use ${minRounds} rounds</button>`;
  sug.classList.add("show");
  $("useSuggest").onclick = ()=>{
    planMode = "rounds";
    $("planMode").querySelectorAll("button").forEach(x=>x.classList.toggle("on", x.dataset.m==="rounds"));
    $("numLabel").textContent = "Total rounds";
    $("rounds").value = minRounds;
    updatePrediction();
  };
}

function gcd(a,b){ while(b){ [a,b]=[b,a%b]; } return a; }

// ---------------- scheduler ----------------
function pairKey(a,b){ return a<b ? a+"|"+b : b+"|"+a; }

function generate(){
  const N = players.length, perGame = teamSize*2, R = resolveRounds();
  const courts = usableCourts(), seats = courts*perGame;
  if(N < perGame){ errEl.textContent = `Need at least ${perGame} players.`; return; }
  if(R < 1){ errEl.textContent = "Enter a number of at least 1."; return; }

  const games = {}, lastPlayed = {};
  players.forEach(p=>{ games[p]=0; lastPlayed[p]=-999; });
  const partnerCount = {}, oppCount = {};
  const schedule = [];   // flat list of games, each tagged with round + court

  for(let r=0;r<R;r++){
    // rank: fewest games first, then longest wait, then random — take `seats` players for this round
    const ranked = [...players].sort((a,b)=>
      (games[a]-games[b]) ||
      (lastPlayed[a]-lastPlayed[b]) ||
      (Math.random()-0.5)
    );
    const playing = ranked.slice(0, seats);
    const resting = ranked.slice(seats);

    // split the round's players across courts, then form teams on each court
    for(let c=0;c<courts;c++){
      const onCourt = playing.slice(c*perGame, c*perGame+perGame);

      let teams;
      if(teamSize===1){
        teams = [[onCourt[0]],[onCourt[1]]];
      } else {
        const [a,b,cc,d] = onCourt;
        const opts = [
          [[a,b],[cc,d]],
          [[a,cc],[b,d]],
          [[a,d],[b,cc]],
        ];
        // minimise repeated partnerships (weighted) + repeated opponents
        let best=null, bestCost=Infinity;
        for(const o of opts){
          const [[t1a,t1b],[t2a,t2b]] = o;
          let cost = 3*((partnerCount[pairKey(t1a,t1b)]||0) + (partnerCount[pairKey(t2a,t2b)]||0));
          for(const x of o[0]) for(const y of o[1]) cost += (oppCount[pairKey(x,y)]||0);
          cost += Math.random()*0.5; // break ties randomly
          if(cost<bestCost){ bestCost=cost; best=o; }
        }
        teams = best;
      }

      // commit this court's game
      for(const p of onCourt){ games[p]++; lastPlayed[p]=r; }
      if(teamSize===2){
        partnerCount[pairKey(teams[0][0],teams[0][1])] = (partnerCount[pairKey(teams[0][0],teams[0][1])]||0)+1;
        partnerCount[pairKey(teams[1][0],teams[1][1])] = (partnerCount[pairKey(teams[1][0],teams[1][1])]||0)+1;
      }
      for(const x of teams[0]) for(const y of teams[1]){
        oppCount[pairKey(x,y)] = (oppCount[pairKey(x,y)]||0)+1;
      }

      // resting only listed once per round (on the first court's game)
      schedule.push({ round:r+1, court:c+1, teams, resting: c===0 ? resting : [] });
    }
  }

  lastSchedule = { schedule, games, N, R, perGame, courts };
  render(lastSchedule, true);
}

// ---------------- render ----------------
function render(data, scroll=false){
  const { schedule, games } = data;
  $("out").style.display = "block";
  const courts = data.courts || 1;

  // group games by round number (a round runs `courts` games in parallel)
  const rounds = {};
  schedule.forEach((g,idx)=>{ (rounds[g.round]=rounds[g.round]||[]).push({g,idx}); });
  const roundNums = Object.keys(rounds).map(Number).sort((a,b)=>a-b);

  // wait analysis: longest consecutive rounds a player sits out
  const maxWait = {}; players.forEach(p=>maxWait[p]=0);
  const cur = {}; players.forEach(p=>cur[p]=0);
  for(const rn of roundNums){
    const playing = new Set(rounds[rn].flatMap(x=>x.g.teams.flat()));
    for(const p of players){
      if(playing.has(p)) cur[p]=0;
      else { cur[p]++; if(cur[p]>maxWait[p]) maxWait[p]=cur[p]; }
    }
  }
  const gvals = Object.values(games);
  const worstWait = Math.max(...Object.values(maxWait), 0);

  // summary
  $("summ").innerHTML = `
    <div class="b"><div class="v">${roundNums.length}</div><div class="k">Rounds</div></div>
    <div class="b"><div class="v">${courts}</div><div class="k">Court${courts===1?"":"s"}</div></div>
    <div class="b"><div class="v">${Math.min(...gvals)}–${Math.max(...gvals)}</div><div class="k">Games / player</div></div>
    <div class="b"><div class="v">${worstWait}</div><div class="k">Longest wait (rounds)</div></div>`;

  // per-player stats
  $("stats").innerHTML = players.map(p=>
    `<div class="stat"><div class="nm">${escapeHtml(p)}</div>
     <div class="mt">${games[p]} game${games[p]===1?"":"s"} · max wait ${maxWait[p]}</div></div>`
  ).join("");

  // schedule — one block per round, containing each court's game
  $("schedule").innerHTML = roundNums.map(rn=>{
    const list = rounds[rn];
    const resting = list[0].g.resting || [];
    const rest = resting.length
      ? `<div class="rest"><b>Resting:</b> ${resting.map(p=>`<span class="rp">${escapeHtml(p)}</span>`).join("")}</div>` : "";
    const courtCards = list.map(({g:rnd,idx:i})=>{
      const [A,B] = rnd.teams;
      const decided = rnd.winner!=null;
      const clsA = decided ? (rnd.winner===0?"win":"lose") : "";
      const clsB = decided ? (rnd.winner===1?"win":"lose") : "";
      const sA = rnd.scoreA!=null ? rnd.scoreA : "";
      const sB = rnd.scoreB!=null ? rnd.scoreB : "";
      const courtTag = courts>1 ? `<span class="courtTag">Court ${rnd.court}</span>` : "";
      return `<div class="courtGame">
        ${courtTag}
        <div class="match ${decided?"decided":""}">
          <div class="team A ${clsA}" data-game="${i}" data-team="0"><span class="lbl">Team A</span>${A.map(p=>`<span class="p">${escapeHtml(p)}</span>`).join("")}</div>
          <span class="vs">VS</span>
          <div class="team B ${clsB}" data-game="${i}" data-team="1"><span class="lbl">Team B</span>${B.map(p=>`<span class="p">${escapeHtml(p)}</span>`).join("")}</div>
        </div>
        <div class="scores">
          <span class="sd A">A</span>
          <input type="number" min="0" inputmode="numeric" class="scoreIn" data-game="${i}" data-side="A" value="${sA}" placeholder="–" />
          <span class="dash">–</span>
          <input type="number" min="0" inputmode="numeric" class="scoreIn" data-game="${i}" data-side="B" value="${sB}" placeholder="–" />
          <span class="sd B">B</span>
        </div>
      </div>`;
    }).join("");
    return `<div class="round">
      <div class="top"><span class="rn">ROUND ${rn}</span></div>
      <div class="courts ${list.length>1?"multi":""}">${courtCards}</div>
      <div class="pickHint">Enter a score, or tap the winning team on each court</div>
      ${rest}</div>`;
  }).join("");

  renderLeaderboard(data);
  renderInsights(data);
  maybeCelebrate(data);
  if(scroll) $("out").scrollIntoView({behavior:"smooth", block:"start"});
}

// click a team to toggle it as the winner of that game
$("schedule").addEventListener("click",(e)=>{
  const t = e.target.closest(".team");
  if(!t || !lastSchedule) return;
  const gi = +t.dataset.game, ti = +t.dataset.team;
  const rnd = lastSchedule.schedule[gi];
  // if scores exist, they own the winner; a manual tap clears scores
  rnd.scoreA = null; rnd.scoreB = null;
  rnd.winner = (rnd.winner===ti) ? null : ti;  // click again to clear
  render(lastSchedule);   // stay in place, don't scroll
});

// type a score -> derive winner live, without a full re-render (keeps focus)
$("schedule").addEventListener("input",(e)=>{
  const inp = e.target.closest(".scoreIn");
  if(!inp || !lastSchedule) return;
  const gi = +inp.dataset.game;
  const rnd = lastSchedule.schedule[gi];
  const box = inp.closest(".courtGame");
  const a = box.querySelector('.scoreIn[data-side="A"]').value.trim();
  const b = box.querySelector('.scoreIn[data-side="B"]').value.trim();
  rnd.scoreA = a==="" ? null : Math.max(0, parseInt(a,10)||0);
  rnd.scoreB = b==="" ? null : Math.max(0, parseInt(b,10)||0);
  // winner needs both scores and no tie
  if(rnd.scoreA!=null && rnd.scoreB!=null && rnd.scoreA!==rnd.scoreB){
    rnd.winner = rnd.scoreA>rnd.scoreB ? 0 : 1;
  } else {
    rnd.winner = null;
  }
  // update just this game's highlight + the analytics; don't rebuild schedule
  const match = box.querySelector(".match");
  const teams = box.querySelectorAll(".team");
  const decided = rnd.winner!=null;
  match.classList.toggle("decided", decided);
  teams[0].classList.toggle("win", decided && rnd.winner===0);
  teams[0].classList.toggle("lose", decided && rnd.winner===1);
  teams[1].classList.toggle("win", decided && rnd.winner===1);
  teams[1].classList.toggle("lose", decided && rnd.winner===0);
  renderLeaderboard(lastSchedule);
  renderInsights(lastSchedule);
  maybeCelebrate(lastSchedule);
});

// ---------------- leaderboard ----------------
function computeRecords(schedule){
  const rec = {};
  players.forEach(p=>{ rec[p]={p,wins:0,losses:0,played:0,pf:0,pa:0}; });
  for(const rnd of schedule){
    if(rnd.winner==null) continue;
    const winners = rnd.teams[rnd.winner], losers = rnd.teams[1-rnd.winner];
    const wScore = rnd.winner===0 ? rnd.scoreA : rnd.scoreB;
    const lScore = rnd.winner===0 ? rnd.scoreB : rnd.scoreA;
    const hasScore = wScore!=null && lScore!=null;
    for(const p of winners){ if(rec[p]){ rec[p].wins++; rec[p].played++;
      if(hasScore){ rec[p].pf+=wScore; rec[p].pa+=lScore; } } }
    for(const p of losers){ if(rec[p]){ rec[p].losses++; rec[p].played++;
      if(hasScore){ rec[p].pf+=lScore; rec[p].pa+=wScore; } } }
  }
  return rec;
}

// Single source of truth for ranking — leaderboard, insights, and celebration all use this.
function rankRows(schedule){
  const rec = computeRecords(schedule);
  return Object.values(rec).map(r=>({
    ...r, diff:r.pf-r.pa, winPct:r.played ? r.wins/r.played : 0
  })).sort((a,b)=>
    (b.wins-a.wins) || (b.winPct-a.winPct) || (b.diff-a.diff) ||
    (a.losses-b.losses) || a.p.localeCompare(b.p)
  );
}

function renderLeaderboard(data){
  const { schedule } = data;
  const anyScores = schedule.some(r=>r.scoreA!=null && r.scoreB!=null);
  const rows = rankRows(schedule);

  const decidedCount = schedule.filter(r=>r.winner!=null).length;
  const maxWins = Math.max(1, ...rows.map(r=>r.wins));

  const scoreCols = anyScores
    ? `<th>PF</th><th>PA</th><th>Diff</th>` : ``;

  $("lb").innerHTML = `
    <table class="lb">
      <thead><tr>
        <th class="rank">#</th><th class="name">Player</th>
        <th>Played</th><th>Wins</th><th>Losses</th><th>Win %</th>${scoreCols}<th class="barcell">Form</th>
      </tr></thead>
      <tbody>
        ${rows.map((r,i)=>`
          <tr class="${i<3?"top"+(i+1):""}">
            <td class="rank">${i+1}</td>
            <td class="name">${escapeHtml(r.p)}</td>
            <td>${r.played}</td>
            <td class="w">${r.wins}</td>
            <td class="l">${r.losses}</td>
            <td>${r.played? Math.round(r.winPct*100)+"%" : "—"}</td>
            ${anyScores? `<td>${r.pf}</td><td>${r.pa}</td><td class="${r.diff>0?"w":r.diff<0?"l":""}">${r.diff>0?"+":""}${r.diff}</td>`:``}
            <td class="barcell"><div class="bar"><span style="width:${(r.wins/maxWins)*100}%"></span></div></td>
          </tr>`).join("")}
      </tbody>
    </table>
    <div class="pickHint">${decidedCount} of ${schedule.length} games recorded${decidedCount<schedule.length?" · enter a score or tap a winner in each game above":""}. ${anyScores?"PF = points for · PA = points against · Diff = net.":""}</div>`;
}

// ---------------- insights ----------------
function renderInsights(data){
  const { schedule } = data;
  const rec = computeRecords(schedule);
  const decided = schedule.filter(r=>r.winner!=null);
  const scored = schedule.filter(r=>r.scoreA!=null && r.scoreB!=null);
  const box = $("insights");

  if(!decided.length){
    box.className = "";
    box.innerHTML = `<div class="emptyIns">Record some results (winner or scores) to unlock insights.</div>`;
    return;
  }
  box.className = "insights";
  const arr = Object.values(rec).filter(r=>r.played>0);
  const cards = [];
  const add = (ic,k,v,d)=>cards.push(`<div class="ins"><div class="ic">${ic}</div><div><div class="k">${k}</div><div class="v">${escapeHtml(v)}</div>${d?`<div class="d">${escapeHtml(d)}</div>`:""}</div></div>`);

  // 1. Leader (same ranking as the leaderboard #1)
  const best = rankRows(schedule).filter(r=>r.played>0)[0];
  add("👑","Top of the table",best.p,`${best.wins} win${best.wins===1?"":"s"} from ${best.played} game${best.played===1?"":"s"}`);

  // 2. Best win rate (min 2 games)
  const rateElig = arr.filter(r=>r.played>=2);
  if(rateElig.length){
    const hr = [...rateElig].sort((a,b)=>(b.wins/b.played)-(a.wins/a.played))[0];
    add("🎯","Best win rate",`${Math.round(hr.wins/hr.played*100)}% — ${hr.p}`,`${hr.wins}/${hr.played} games won`);
  }

  // 3. Win/loss streaks (chronological)
  const streaks = streakInsight(schedule, rec);
  if(streaks.hot) add("🔥","Hottest streak",`${streaks.hot.p} — ${streaks.hot.len} in a row`,"Consecutive wins");
  if(streaks.cold) add("🧊","Cold spell",`${streaks.cold.p} — ${streaks.cold.len} losses`,"Consecutive losses");

  // 4. Point machine / stingy defense (scored games only)
  if(scored.length){
    const withScore = arr.filter(r=>r.pf>0||r.pa>0);
    const attacker = [...withScore].sort((a,b)=>(b.pf/b.played)-(a.pf/a.played))[0];
    if(attacker) add("💥","Most points scored",attacker.p,`${(attacker.pf/attacker.played).toFixed(1)} pts/game (${attacker.pf} total)`);
    const wall = [...withScore].sort((a,b)=>(a.pa/a.played)-(b.pa/b.played))[0];
    if(wall) add("🛡️","Toughest to score on",wall.p,`${(wall.pa/wall.played).toFixed(1)} pts conceded/game`);
    const bestDiff = [...withScore].sort((a,b)=>(b.pf-b.pa)-(a.pf-a.pa))[0];
    if(bestDiff) add("📈","Best point differential",`${bestDiff.p} (${bestDiff.pf-bestDiff.pa>0?"+":""}${bestDiff.pf-bestDiff.pa})`,`Scored ${bestDiff.pf}, conceded ${bestDiff.pa}`);

    // biggest blowout & closest game
    let blow=null, close=null;
    for(const r of scored){
      const m=Math.abs(r.scoreA-r.scoreB);
      if(!blow||m>blow.m) blow={m,r};
      if(!close||m<close.m) close={m,r};
    }
    if(blow){ const w=blow.r.teams[blow.r.winner].join(" & "); add("🚀","Biggest blowout",`${blow.r.scoreA}–${blow.r.scoreB}`,`Game ${blow.r.round}: won by ${w} (${blow.m} pts)`); }
    if(close && close.m>0){ add("😮‍💨","Nail-biter",`${close.r.scoreA}–${close.r.scoreB}`,`Game ${close.r.round}: decided by ${close.m}`); }
  }

  // 5. Best & worst partnership (doubles only)
  if(teamSize===2){
    const pd = partnerInsight(schedule);
    if(pd.best) add("🤝","Best duo",pd.best.names,`${pd.best.wins}/${pd.best.games} won together`);
    if(pd.worst && pd.worst.games>=2 && pd.worst.wins<pd.worst.games)
      add("💔","Struggling duo",pd.worst.names,`${pd.worst.wins}/${pd.worst.games} won together`);
  }

  // 6. Most improved-ish / unlucky: most losses
  const unlucky=[...arr].sort((a,b)=>b.losses-a.losses)[0];
  if(unlucky && unlucky.losses>=2 && unlucky.wins<unlucky.losses)
    add("🍀","Due for a win",unlucky.p,`${unlucky.losses} losses so far`);

  // 7. Undefeated (min 2 games, no losses)
  const undef = arr.filter(r=>r.played>=2 && r.losses===0).sort((a,b)=>b.wins-a.wins);
  if(undef.length) add("💎","Still undefeated",undef.map(r=>r.p).join(", "),`${undef[0].wins}-0${undef.length>1?" and others":""}`);

  // 8. Winless (min 2 games, no wins)
  const winless = arr.filter(r=>r.played>=2 && r.wins===0).sort((a,b)=>b.losses-a.losses);
  if(winless.length) add("🫥","Still searching",winless.map(r=>r.p).join(", "),`0-${winless[0].losses}${winless.length>1?" and others":""}`);

  // 9. Active streak (currently on a run)
  const active = activeStreak(schedule);
  if(active && active.len>=2) add(active.type==="W"?"⚡":"⬇️", active.type==="W"?"On fire right now":"Needs to bounce back",
      `${active.p} — ${active.len} ${active.type==="W"?"wins":"losses"} in a row`, "Current active streak");

  // 10. Head-to-head: nemesis & bunny
  const h2h = h2hInsight(schedule);
  if(h2h.rivalry) add("⚔️","Biggest rivalry",h2h.rivalry.names,`Faced off ${h2h.rivalry.games} times (${h2h.rivalry.split})`);
  if(h2h.nemesis) add("😈","Most one-sided matchup",`${h2h.nemesis.loser} vs ${h2h.nemesis.winner}`,`${h2h.nemesis.winner} leads ${h2h.nemesis.w}-${h2h.nemesis.l}`);

  // 11. Clutch: best record in close games (margin <= 3, scored)
  if(scored.length){
    const clutch = clutchInsight(schedule);
    if(clutch) add("🧊","Clutch under pressure",clutch.p,`${clutch.wins}/${clutch.games} close games won (≤3 pts)`);

    // 12. Highest-scoring game (total points)
    let hi=null;
    for(const r of scored){ const tot=r.scoreA+r.scoreB; if(!hi||tot>hi.tot) hi={tot,r}; }
    if(hi) add("🎆","Highest-scoring game",`${hi.r.scoreA}–${hi.r.scoreB} (${hi.tot} pts)`,`Game ${hi.r.round}`);

    // 13. Average winning margin (dominance meter)
    let sum=0,n=0; for(const r of scored){ sum+=Math.abs(r.scoreA-r.scoreB); n++; }
    if(n) add("📊","Average margin",`${(sum/n).toFixed(1)} pts`,`Across ${n} scored game${n===1?"":"s"}`);
  }

  // 14. Fresh legs vs fatigue — win rate right after a rest vs back-to-back
  const fresh = freshLegsInsight(schedule);
  if(fresh) add("😮‍💨","Fresh legs effect",`${fresh.freshPct}% vs ${fresh.tiredPct}%`,
      `Win rate just after resting vs. playing back-to-back${fresh.freshPct>fresh.tiredPct?" — rest helps!":fresh.freshPct<fresh.tiredPct?" — momentum matters!":""}`);

  // 15. Court-side bias (Team A vs Team B) — meta/fun
  let aWins=0,bWins=0; for(const r of decided){ if(r.winner===0)aWins++; else bWins++; }
  if(aWins+bWins>=4 && aWins!==bWins) add("↔️","Court-side tally",`Team A ${aWins} · Team B ${bWins}`,
      Math.abs(aWins-bWins)>=Math.ceil((aWins+bWins)/3)?"One side's running hot — swap ends?":"Nicely balanced");

  box.innerHTML = cards.join("");
}

function streakInsight(schedule, rec){
  // walk games in order, track current W/L streak per player
  const curW={}, curL={}, bestW={}, bestL={};
  players.forEach(p=>{curW[p]=curL[p]=bestW[p]=bestL[p]=0;});
  for(const rnd of schedule){
    if(rnd.winner==null) continue;
    const W=rnd.teams[rnd.winner], L=rnd.teams[1-rnd.winner];
    for(const p of W){ curW[p]++; curL[p]=0; if(curW[p]>bestW[p])bestW[p]=curW[p]; }
    for(const p of L){ curL[p]++; curW[p]=0; if(curL[p]>bestL[p])bestL[p]=curL[p]; }
  }
  let hot=null, cold=null;
  players.forEach(p=>{
    if(bestW[p]>=2 && (!hot||bestW[p]>hot.len)) hot={p,len:bestW[p]};
    if(bestL[p]>=2 && (!cold||bestL[p]>cold.len)) cold={p,len:bestL[p]};
  });
  return {hot,cold};
}

function partnerInsight(schedule){
  const map={};
  for(const rnd of schedule){
    if(rnd.winner==null || rnd.teams[0].length<2) continue;
    for(const side of [0,1]){
      const [a,b]=rnd.teams[side]; if(!a||!b) continue;
      const key=pairKey(a,b);
      if(!map[key]) map[key]={names:`${a} & ${b}`,games:0,wins:0};
      map[key].games++;
      if(rnd.winner===side) map[key].wins++;
    }
  }
  const all=Object.values(map).filter(d=>d.games>=1);
  if(!all.length) return {};
  const best=[...all].sort((a,b)=>(b.wins/b.games-a.wins/a.games)||(b.games-a.games))[0];
  const worst=[...all].sort((a,b)=>(a.wins/a.games-b.wins/b.games)||(b.games-a.games))[0];
  return {best,worst};
}

// current (most recent) active streak across all players
function activeStreak(schedule){
  const cur={}, type={};
  players.forEach(p=>{cur[p]=0;type[p]=null;});
  for(const rnd of schedule){
    if(rnd.winner==null) continue;
    const W=rnd.teams[rnd.winner], L=rnd.teams[1-rnd.winner];
    for(const p of W){ type[p]==="W"?cur[p]++:(cur[p]=1,type[p]="W"); }
    for(const p of L){ type[p]==="L"?cur[p]++:(cur[p]=1,type[p]="L"); }
  }
  let best=null;
  players.forEach(p=>{ if(cur[p]>=2 && (!best||cur[p]>best.len)) best={p,len:cur[p],type:type[p]}; });
  return best;
}

// head-to-head across opposing sides (uses individual players)
function h2hInsight(schedule){
  const pair={}; // key -> {a,b, aWins, bWins}
  for(const rnd of schedule){
    if(rnd.winner==null) continue;
    const W=rnd.teams[rnd.winner], L=rnd.teams[1-rnd.winner];
    for(const w of W) for(const l of L){
      const key=pairKey(w,l), [x,y]=key.split("|");
      if(!pair[key]) pair[key]={x,y,xW:0,yW:0,games:0};
      pair[key].games++;
      if(w===x) pair[key].xW++; else pair[key].yW++;
    }
  }
  const all=Object.values(pair);
  if(!all.length) return {};
  // biggest rivalry = most games between the same two people
  const rivalryRaw=[...all].sort((a,b)=>b.games-a.games)[0];
  const rivalry = rivalryRaw.games>=2 ? {
    names:`${rivalryRaw.x} vs ${rivalryRaw.y}`, games:rivalryRaw.games,
    split:`${rivalryRaw.xW}-${rivalryRaw.yW}`
  } : null;
  // most one-sided = biggest lopsided record (min 2 games)
  const dom=[...all].filter(p=>p.games>=2)
    .sort((a,b)=>Math.abs(b.xW-b.yW)-Math.abs(a.xW-a.yW))[0];
  let nemesis=null;
  if(dom && dom.xW!==dom.yW){
    const winner = dom.xW>dom.yW?dom.x:dom.y, loser = dom.xW>dom.yW?dom.y:dom.x;
    nemesis={winner,loser,w:Math.max(dom.xW,dom.yW),l:Math.min(dom.xW,dom.yW)};
  }
  return {rivalry,nemesis};
}

// best record in close games (margin <= 3)
function clutchInsight(schedule){
  const rec={};
  for(const rnd of schedule){
    if(rnd.winner==null || rnd.scoreA==null || rnd.scoreB==null) continue;
    if(Math.abs(rnd.scoreA-rnd.scoreB)>3) continue;
    const W=rnd.teams[rnd.winner], L=rnd.teams[1-rnd.winner];
    for(const p of W){ (rec[p]=rec[p]||{p,wins:0,games:0}).wins++; rec[p].games++; }
    for(const p of L){ (rec[p]=rec[p]||{p,wins:0,games:0}).games++; }
  }
  const all=Object.values(rec).filter(r=>r.games>=2);
  if(!all.length) return null;
  return [...all].sort((a,b)=>(b.wins/b.games-a.wins/a.games)||(b.games-a.games))[0];
}

// win rate right after a rest vs. back-to-back games (rounds, court-aware)
function freshLegsInsight(schedule){
  let freshW=0,freshN=0,tiredW=0,tiredN=0;
  const lastPlayedRound={};
  // group games by round so "rested" means sat out an entire round
  const byRound={};
  schedule.forEach(g=>{ (byRound[g.round]=byRound[g.round]||[]).push(g); });
  const roundNums=Object.keys(byRound).map(Number).sort((a,b)=>a-b);
  for(const rn of roundNums){
    for(const rnd of byRound[rn]){
      if(rnd.winner==null){ for(const p of rnd.teams.flat()) lastPlayedRound[p]=rn; continue; }
      const playing=rnd.teams.flat();
      const won=new Set(rnd.teams[rnd.winner]);
      for(const p of playing){
        const prev=lastPlayedRound[p];
        const rested = prev===undefined || (rn-prev)>1;
        if(rested){ freshN++; if(won.has(p))freshW++; }
        else { tiredN++; if(won.has(p))tiredW++; }
      }
    }
    // mark everyone who played this round
    for(const rnd of byRound[rn]) for(const p of rnd.teams.flat()) lastPlayedRound[p]=rn;
  }
  if(freshN<2 || tiredN<2) return null;
  return { freshPct:Math.round(freshW/freshN*100), tiredPct:Math.round(tiredW/tiredN*100) };
}

$("genBtn").onclick = generate;
$("reshuffle").onclick = generate;
$("resetResults").onclick = ()=>{
  if(!lastSchedule) return;
  lastSchedule.schedule.forEach(r=>{ r.winner=null; r.scoreA=null; r.scoreB=null; });
  render(lastSchedule);
};
$("copyBtn").onclick = ()=>{
  if(!lastSchedule) return;
  const courts = lastSchedule.courts || 1;
  const byRound={};
  lastSchedule.schedule.forEach(g=>{ (byRound[g.round]=byRound[g.round]||[]).push(g); });
  const lines=[];
  Object.keys(byRound).map(Number).sort((a,b)=>a-b).forEach(rn=>{
    lines.push(`— Round ${rn} —`);
    for(const r of byRound[rn]){
      const label = courts>1 ? `Court ${r.court}` : "Game";
      const a=r.teams[0].join(" & "), b=r.teams[1].join(" & ");
      const sc = (r.scoreA!=null && r.scoreB!=null) ? `  [${r.scoreA}-${r.scoreB}]` : "";
      const win = r.winner!=null ? `  → ${r.teams[r.winner].join(" & ")} won` : "";
      lines.push(`  ${label}: ${a}  vs  ${b}${sc}${win}`);
    }
    const rest = byRound[rn][0].resting || [];
    if(rest.length) lines.push(`  (resting: ${rest.join(", ")})`);
  });
  navigator.clipboard.writeText(lines.join("\n")).then(()=>{
    const btn=$("copyBtn"); const t=btn.textContent; btn.textContent="Copied ✓";
    setTimeout(()=>btn.textContent=t,1200);
  });
};

function escapeHtml(s){ return s.replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

// ---------------- celebration (fireworks + confetti) ----------------
const fx = $("fx"), fxc = fx.getContext("2d");
let fxParticles = [], fxRaf = null, fxUntil = 0, celebrated = false;
function fxResize(){ fx.width = innerWidth*devicePixelRatio; fx.height = innerHeight*devicePixelRatio;
  fxc.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0); }
addEventListener("resize", fxResize);

const FXCOLORS = ["#ffd23f","#ff5d8f","#34d399","#22d3ee","#a78bfa","#ff9f1c","#ffffff"];
function rand(a,b){ return a + Math.random()*(b-a); }

function firework(x,y){
  const n = 42, hue = FXCOLORS[Math.floor(Math.random()*FXCOLORS.length)];
  for(let i=0;i<n;i++){
    const ang = (Math.PI*2*i)/n + rand(-0.1,0.1), sp = rand(2.5,6.5);
    fxParticles.push({x,y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,
      life:1,decay:rand(0.008,0.018),size:rand(2,4),color:hue,g:0.045,kind:"spark"});
  }
}
function confettiBurst(){
  for(let i=0;i<70;i++){
    fxParticles.push({x:rand(0,innerWidth),y:rand(-60,-10),
      vx:rand(-1.5,1.5),vy:rand(1.5,4),life:1,decay:rand(0.003,0.006),
      size:rand(5,10),color:FXCOLORS[i%FXCOLORS.length],g:0.03,rot:rand(0,6.28),
      vr:rand(-0.2,0.2),kind:"confetti"});
  }
}
function balloon(){
  const c=FXCOLORS[Math.floor(Math.random()*FXCOLORS.length)];
  fxParticles.push({x:rand(30,innerWidth-30),y:innerHeight+30,vx:rand(-0.4,0.4),vy:rand(-1.6,-2.6),
    life:1,decay:0.004,size:rand(16,26),color:c,g:0,sway:rand(0,6.28),kind:"balloon"});
}
function fxTick(){
  fxc.clearRect(0,0,innerWidth,innerHeight);
  for(const p of fxParticles){
    p.vy += p.g; p.x += p.vx; p.y += p.vy; p.life -= p.decay;
    if(p.kind==="confetti"){ p.rot += p.vr;
      fxc.save(); fxc.translate(p.x,p.y); fxc.rotate(p.rot);
      fxc.globalAlpha=Math.max(0,p.life); fxc.fillStyle=p.color;
      fxc.fillRect(-p.size/2,-p.size/4,p.size,p.size/2); fxc.restore();
    } else if(p.kind==="balloon"){ p.sway+=0.05; p.x+=Math.sin(p.sway)*0.6;
      fxc.globalAlpha=Math.max(0,p.life); fxc.fillStyle=p.color;
      fxc.beginPath(); fxc.ellipse(p.x,p.y,p.size*0.8,p.size,0,0,7); fxc.fill();
      fxc.strokeStyle="rgba(255,255,255,.4)"; fxc.lineWidth=1;
      fxc.beginPath(); fxc.moveTo(p.x,p.y+p.size); fxc.lineTo(p.x,p.y+p.size+18); fxc.stroke();
    } else {
      fxc.globalAlpha=Math.max(0,p.life); fxc.fillStyle=p.color;
      fxc.beginPath(); fxc.arc(p.x,p.y,p.size,0,7); fxc.fill();
    }
  }
  fxc.globalAlpha=1;
  fxParticles = fxParticles.filter(p=>p.life>0 && p.y<innerHeight+80);
  const now = performance.now();
  if(now<fxUntil && Math.random()<0.25) firework(rand(innerWidth*0.15,innerWidth*0.85), rand(innerHeight*0.15,innerHeight*0.5));
  if(now<fxUntil && Math.random()<0.15) balloon();
  if(fxParticles.length || now<fxUntil){ fxRaf=requestAnimationFrame(fxTick); }
  else { fx.style.display="none"; if(fxRaf)cancelAnimationFrame(fxRaf); fxRaf=null; }
}
function celebrate(champ){
  fxResize(); fx.style.display="block";
  fxUntil = performance.now()+4500;
  confettiBurst();
  for(let i=0;i<5;i++) setTimeout(()=>firework(rand(innerWidth*0.2,innerWidth*0.8),rand(innerHeight*0.2,innerHeight*0.5)), i*180);
  for(let i=0;i<8;i++) setTimeout(balloon, i*120);
  if(!fxRaf) fxRaf=requestAnimationFrame(fxTick);
  // champion banner
  if(champ){
    $("champName").textContent = champ.p;
    $("champSub").textContent = `${champ.wins} wins${champ.played?` · ${Math.round(champ.wins/champ.played*100)}% win rate`:""}`;
    const c=$("champ"); c.classList.add("show");
    setTimeout(()=>c.classList.remove("show"), 5000);
  }
}

// fire the celebration when every game has a result (once per completion)
function maybeCelebrate(data){
  const { schedule } = data;
  const allDone = schedule.length>0 && schedule.every(r=>r.winner!=null);
  if(allDone && !celebrated){
    celebrated = true;
    const champ = rankRows(schedule).filter(r=>r.played>0)[0];
    celebrate(champ);
  }
  if(!allDone) celebrated = false; // reset if a result is cleared
}

renderChips();
